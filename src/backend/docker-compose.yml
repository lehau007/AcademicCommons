services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: academic_kb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d academic_kb"]
      interval: 5s
      timeout: 30s
      retries: 6

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 6

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 10s
      retries: 6

  api:
    build:
      context: ../..
      dockerfile: src/backend/docker/Dockerfile.api
    environment: &backend_environment
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: academic_kb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      REDIS_URL: redis://redis:6379/0
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: documents
      STORAGE_PUBLIC_HOST: http://localhost:9000
      JWT_SECRET: changeme_in_prod_minimum_32_bytes
      JWT_ALGORITHM: HS256
      EMAIL_BACKEND: ${EMAIL_BACKEND:-console}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-Academic Commons <onboarding@resend.dev>}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      EMAIL_VERIFICATION_TTL_MINUTES: ${EMAIL_VERIFICATION_TTL_MINUTES:-60}
      EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS: ${EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS:-60}
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DIM: 384
      AZURE_AI_API_KEY: ${AZURE_AI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OCR_ENABLE_REAL_VISION: ${OCR_ENABLE_REAL_VISION:-false}
      GROQ_MODEL_ID: ${GROQ_MODEL_ID:-}
      WORKER_OCR_CONCURRENCY: "1"
      WORKER_OCR_JOB_TIMEOUT_SECONDS: "1800"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 5s
      timeout: 5s
      retries: 6

  worker-ocr:
    build:
      context: ../..
      dockerfile: src/backend/docker/Dockerfile.worker
    environment:
      <<: *backend_environment
    command: ["arq", "app.workers.queue.OcrWorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; from redis import Redis; assert Redis.from_url(os.environ['REDIS_URL']).ping()"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker-eval:
    build:
      context: ../..
      dockerfile: src/backend/docker/Dockerfile.worker
    environment:
      <<: *backend_environment
    command: ["arq", "app.workers.queue.EvalWorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; from redis import Redis; assert Redis.from_url(os.environ['REDIS_URL']).ping()"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker-index:
    build:
      context: ../..
      dockerfile: src/backend/docker/Dockerfile.worker
    environment:
      <<: *backend_environment
    command: ["arq", "app.workers.queue.IndexWorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; from redis import Redis; assert Redis.from_url(os.environ['REDIS_URL']).ping()"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
  minio_data:
